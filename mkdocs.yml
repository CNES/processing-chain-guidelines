site_name: Basic MkDocs Example Project
nav:
  - Home: index.md
  - Best practices: best_practices.md
  - Data Processing Chain Template: Data_processing_chain_template.md
theme:
  name: readthedocs
  highlightjs: true
plugins:
  - search
  - mkdocstrings:
      handlers:
        # See: https://mkdocstrings.github.io/python/usage/
        python:
          options:
            docstring_style: sphinx
markdown_extensions:
  - markdown_include.include:
      base_path: .
  - admonition
